<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="tables-formates" />
    <title>rows and columns</title>
  </head>
  <body>
    <table
      style="border: red"
      bgcolor="yellow"
      align="center"
      border="1"
      height="50"
      width="50"
      cellspacing="31"
      cellpadding="30"
    >
      <tr style="background-color: blue">
        <th style="background-color: red">numbers</th>
        <th>numbers</th>
        <th>numbers</th>
      </tr>
      <tfoot>
        <tr>
          <td colspan="3" align="center">practice</td>
          <!-- <td align="center">2</td>
          <td>5</td>-->
        </tr>
      </tfoot>

      <thead>
        <tr>
          <td rowspan="3">3</td>
          <td>4</td>
          <td>6</td>
        </tr>
      </thead>
    </table>
  </body>
</html>
